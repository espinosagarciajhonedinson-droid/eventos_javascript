<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Empleados | SAS</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; }
        p { font-size: 1.1rem; color: #666; }
        .sena-logo {
            font-weight: bold;
            color: #39a900;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="favicon.png" alt="Logo Soluciones Empresariales" style="width: 150px; margin-bottom: 20px;">
        <h1>Soluciones Empresariales S.A.S.</h1>
        <p class="sena-logo">Taller de Programación JavaScript - SENA</p>
        <p>El sistema se está ejecutando mediante ventanas interactivas.</p>
        <p>Si cerraste el menú, recarga la página (F5) para iniciar de nuevo.</p>
    </div>

    <!-- Vinculación del script -->
    <script src="taller_empleados.js"></script>
</body>
</html>
